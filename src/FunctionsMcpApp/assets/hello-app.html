<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello MCP App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #313244;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 { color: #89b4fa; margin-bottom: 0.5rem; }
        p { color: #a6adc8; line-height: 1.6; }
        .badge {
            display: inline-block;
            background: #89b4fa;
            color: #1e1e2e;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 Hello MCP App</h1>
        <p>This is a simple MCP App rendered inside the host UI.
           It demonstrates using <code>AsMcpApp()</code> with a file-backed view.</p>
        <span class="badge">MCP App v1.5.0-preview.1</span>
    </div>
</body>
</html>
