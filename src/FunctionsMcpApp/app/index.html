<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snippet Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 1.5rem;
        }

        /* ── Header ─────────────────────────────────────────── */
        header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        h1 { color: #89b4fa; font-size: 1.25rem; }
        .status {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #6c7086;
            transition: background 0.3s;
        }
        .status.online { background: #a6e3a1; }

        /* ── Tiles ──────────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .tile {
            background: #313244;
            border-radius: 8px;
            padding: 1.25rem;
            border-left: 3px solid #89b4fa;
        }
        .tile h3 {
            font-size: 0.8rem;
            color: #a6adc8;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .tile .value {
            font-size: 1.35rem;
            font-weight: 700;
            color: #cdd6f4;
            word-break: break-word;
        }

        /* ── Bar chart ──────────────────────────────────────── */
        .chart-section {
            margin-top: 1.5rem;
            background: #313244;
            border-radius: 8px;
            padding: 1.25rem;
        }
        .chart-section h2 {
            font-size: 1rem;
            color: #89b4fa;
            margin-bottom: 1rem;
        }
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            height: 140px;
        }
        .bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }
        .bar {
            width: 100%;
            max-width: 48px;
            background: #89b4fa;
            border-radius: 4px 4px 0 0;
            transition: height 0.6s ease;
            min-height: 2px;
        }
        .bar-label {
            font-size: 0.72rem;
            color: #a6adc8;
            margin-top: 0.4rem;
            text-align: center;
        }
        .bar-value {
            font-size: 0.72rem;
            color: #cdd6f4;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }

        /* ── Footer ─────────────────────────────────────────── */
        .footer {
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: #6c7086;
        }

        /* ── Waiting state ──────────────────────────────────── */
        .waiting {
            color: #6c7086;
            font-style: italic;
            text-align: center;
            padding: 2rem 0;
        }
    </style>
</head>
<body>
    <header>
        <span class="status" id="status-dot"></span>
        <h1>Snippet Dashboard</h1>
    </header>

    <div class="grid" id="tiles">
        <!-- Tiles are rendered dynamically by dashboard-app.ts -->
    </div>

    <div class="chart-section" id="chart-section" style="display:none">
        <h2 id="chart-title">Metrics</h2>
        <div class="bar-chart" id="bar-chart"></div>
    </div>

    <div class="waiting" id="waiting">Waiting for tool result…</div>

    <div class="footer" id="footer"></div>

    <script type="module" src="/src/dashboard-app.ts"></script>
</body>
</html>
